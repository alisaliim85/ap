{% extends 'base.html' %}

{% block header_title %}قائمة صرف الأدوية{% endblock %}

{% block content %}
<div class="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div>
        <h2 class="text-2xl font-extrabold text-slate-800 flex items-center gap-2">
            <i class="ph-duotone ph-storefront text-brand-600"></i>
            دورات الصرف المخصصة للصيدلية
        </h2>
        <p class="text-slate-500 text-sm mt-1">إدارة دورات الصرف الموافق عليها وتحديث حالتها</p>
    </div>
</div>

<div class="bg-white rounded-lg border border-slate-200 overflow-hidden">
    <div class="p-4 bg-slate-50 border-b border-slate-200 flex flex-wrap gap-4 items-center">
        <div class="relative flex-1 min-w-[220px]">
            <i class="ph-duotone ph-magnifying-glass absolute top-1/2 right-3 -translate-y-1/2 text-slate-400"></i>
            <input type="text" name="q" value="{{ search }}"
                class="w-full pl-4 pr-10 py-2.5 bg-white border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-brand-500 text-sm"
                placeholder="ابحث برقم المرجع..."
                hx-get="{% url 'medications:pharmacy_refill_list' %}"
                hx-trigger="keyup changed delay:400ms"
                hx-target="#pharmacy-refill-table"
                hx-include="[name='status']">
        </div>
        <select name="status"
            class="px-3 py-2 bg-white border border-slate-300 rounded-md text-slate-600 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500"
            hx-get="{% url 'medications:pharmacy_refill_list' %}"
            hx-trigger="change"
            hx-target="#pharmacy-refill-table"
            hx-include="[name='q']">
            <option value="">كل الحالات</option>
            {% for val, label in status_choices %}
            <option value="{{ val }}" {% if status_filter == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>
    </div>

    <div id="pharmacy-refill-table" class="min-h-[300px]">
        {% include 'medications/partials/pharmacy_refill_table.html' %}
    </div>
</div>
{% endblock %}
